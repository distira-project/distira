---
# DISTIRA policy configuration
# Controls data handling, optimization targets, and token limits.

name: distira-policies

terms:
  - license: "AGPL-3.0"
  - notice: >-
      Distira is free and open-source software, licensed under AGPL-3.0.
      You are free to use, modify, and distribute it. Any modified version
      distributed or made available over a network must be released under
      the same AGPL-3.0 license with its source code.

policies:
  sensitive_data: local_only
  optimize_for: cost
  max_tokens_per_request: 4000
  fallback_provider: ollama-local
  log_level: info
  data_residency: eu
