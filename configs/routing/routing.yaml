---
# KATARA routing configuration
#
# Maps detected intents to providers declared in providers.yaml.
# sensitive_override forces all sensitive requests to a local provider.
# Provider names must match keys in providers.yaml exactly.

routing:
  strategy: hybrid
  default_provider: openai-cloud
  fallback_provider: ollama-llama3
  sensitive_override: ollama-llama3       # sensitive data NEVER leaves local

  task_routing:
    # ── Code tasks → best local code model ──────────────
    review: ollama-qwen2.5-coder
    # ── Debug / analysis → local Mistral 7B ─────────────
    debug: ollama-mistral
    # ── Summarization → OpenAI cloud (for validation) ───
    summarize: openai-cloud
    # ── OCR → cloud Mistral OCR (best quality) ──────────
    ocr: mistral-ocr-cloud
    # ── General → OpenAI cloud (default interactive mode) ─
    general: openai-cloud
