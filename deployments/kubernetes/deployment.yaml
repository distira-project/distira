---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: distira-core
  labels:
    app: distira-core
    version: "7.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: distira-core
  template:
    metadata:
      labels:
        app: distira-core
    spec:
      containers:
        - name: distira-core
          image: distira/core:7.0.0
          ports:
            - containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
